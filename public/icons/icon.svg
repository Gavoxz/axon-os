<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <rect width="512" height="512" rx="128" fill="#000000" />
  <!-- Minimalist Futuristic Axon / A Monogram -->
  <g stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Outer Triangle / A Structure -->
    <path d="M120 400 L256 120 L392 400" />
    <!-- Synaptic Nodes / Axons connecting the crossbar -->
    <path d="M180 300 L332 300" />
    <circle cx="256" cy="120" r="16" fill="#000000" stroke="#ffffff" stroke-width="12" />
    <circle cx="180" cy="300" r="12" fill="#ffffff" />
    <circle cx="332" cy="300" r="12" fill="#ffffff" />
    <!-- Central connection node -->
    <line x1="256" y1="120" x2="256" y2="300" stroke-dasharray="4 8" stroke-width="8" />
    <circle cx="256" cy="220" r="14" fill="#000000" stroke="#ffffff" stroke-width="8" />
  </g>
</svg>
